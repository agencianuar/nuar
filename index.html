<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agência Nuar</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    /* ── TEMAS ── */
    [data-theme="light"] {
      --bg:        #f6f5f1;
      --surface:   #ffffff;
      --surface2:  #f0eeea;
      --border:    rgba(0,0,0,0.07);
      --border-h:  rgba(0,0,0,0.16);
      --text:      #111;
      --text2:     #444;
      --muted:     #999;
      --shadow:    0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
      --shadow-h:  0 4px 20px rgba(0,0,0,0.12);
      --toggle:    #eeecea;
    }
    [data-theme="dark"] {
      --bg:        #111118;
      --surface:   #1a1a24;
      --surface2:  #222230;
      --border:    rgba(255,255,255,0.07);
      --border-h:  rgba(255,255,255,0.18);
      --text:      #f0eff8;
      --text2:     #aaa9c0;
      --muted:     #666480;
      --shadow:    0 1px 4px rgba(0,0,0,0.3), 0 4px 20px rgba(0,0,0,0.25);
      --shadow-h:  0 6px 28px rgba(0,0,0,0.4);
      --toggle:    #222230;
    }

    /* ── BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 16px 72px;
      transition: background .25s, color .25s;
    }

    .page {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── TOGGLE TEMA ── */
    .theme-btn {
      position: fixed;
      top: 16px; right: 16px;
      z-index: 99;
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: var(--shadow);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all .2s;
    }
    .theme-btn:hover { box-shadow: var(--shadow-h); transform: scale(1.06); }

    /* ── HEADER ── */
    .header {
      width: 100%;
      text-align: center;
      margin-bottom: 40px;
      animation: up .45s ease both;
    }

    .org-name {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.8px;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .org-bio {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── SEÇÃO DE BLOCOS ── */
    .section {
      width: 100%;
      margin-bottom: 32px;
      animation: up .45s .07s ease both;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      padding-left: 2px;
    }

    .blocks { display: flex; flex-direction: column; gap: 8px; }

    /* ── BLOCO / CARD ── */
    .block {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 16px 18px;
      border-radius: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: var(--text);
      transition: all .2s ease;
      cursor: pointer;
    }

    .block:hover {
      border-color: var(--border-h);
      box-shadow: var(--shadow-h);
      transform: translateY(-2px);
    }
    .block:active { transform: translateY(0); }

    .block-icon {
      width: 44px; height: 44px;
      border-radius: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      transition: background .25s, border-color .25s;
    }

    .block-info { flex: 1; }
    .block-name { font-size: 14px; font-weight: 700; letter-spacing: -.2px; }
    .block-desc { font-size: 12px; color: var(--text2); margin-top: 2px; transition: color .25s; }

    .block-arrow {
      color: var(--muted);
      font-size: 20px;
      flex-shrink: 0;
      transition: transform .2s, color .2s;
    }
    .block:hover .block-arrow { transform: translateX(3px); color: var(--text); }

    /* ── SHARE / QR ── */
    .share-section {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 28px;
      animation: up .45s .14s ease both;
      transition: background .25s, border-color .25s;
    }

    .share-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      cursor: pointer;
      user-select: none;
      gap: 10px;
    }

    .share-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .share-header-icon {
      font-size: 16px;
    }

    .share-header-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .share-chevron {
      font-size: 14px;
      color: var(--muted);
      transition: transform .25s ease;
    }

    .share-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height .35s ease;
    }

    .share-body.open { max-height: 400px; }

    .share-inner {
      padding: 0 18px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      border-top: 1px solid var(--border);
      padding-top: 18px;
    }

    #qrcode {
      padding: 10px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }
    #qrcode img, #qrcode canvas { display: block; border-radius: 4px; }

    .share-url-row {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      transition: background .25s, border-color .25s;
    }

    .share-url-text {
      flex: 1;
      font-size: 12px;
      color: var(--muted);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .copy-btn {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 5px 11px;
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .3px;
    }
    .copy-btn:hover { border-color: var(--border-h); }
    .copy-btn.copied { color: #22c55e; border-color: #22c55e; }

    /* ── FOOTER ── */
    .footer {
      font-size: 11px;
      color: var(--muted);
      opacity: .5;
    }

    /* ── ANIMAÇÃO ── */
    @keyframes up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 420px) {
      body { padding: 40px 12px 60px; }
      .org-name { font-size: 23px; }
    }
  </style>
</head>
<body>

<button class="theme-btn" id="themeBtn" aria-label="Alternar tema">🌙</button>

<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="org-name" id="orgName"></div>
    <p class="org-bio" id="orgBio"></p>
  </div>

  <!-- BLOCOS DE ACESSO -->
  <div class="section">
    <div class="section-label">Acesse</div>
    <div class="blocks" id="blocksContainer"></div>
  </div>

  <!-- COMPARTILHAR -->
  <div class="share-section">
    <div class="share-header" id="shareToggle">
      <div class="share-header-left">
        <span class="share-header-icon">📤</span>
        <span class="share-header-text">Compartilhar esta página</span>
      </div>
      <span class="share-chevron" id="shareChevron">▼</span>
    </div>
    <div class="share-body" id="shareBody">
      <div class="share-inner">
        <div id="qrcode"></div>
        <div class="share-url-row">
          <span class="share-url-text" id="urlText"></span>
          <button class="copy-btn" id="copyBtn">Copiar</button>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">© <span id="year"></span> Agência Nuar</div>

</div>

<!-- ================================================================
  ✏️  CONFIGURAÇÃO
================================================================ -->
<script>

const CONFIG = {

  /* ---- IDENTIDADE ---- */
  nome: "Agência Nuar",
  bio:  "Hub de acesso às nossas iniciativas.",

  /* URL desta página — usada no QR Code e no link de compartilhamento */
  paginaURL: "https://agencianuar.github.io/nuar",

  /* ---- BLOCOS DE ACESSO ----
     Campos: icone, nome, desc (descrição curta), url
     url: "" para ocultar o bloco
  ---- */
  blocos: [
    {
      icone: "🏢",
      nome:  "Agência Nuar",
      desc:  "Nossa agência principal",
      url:   ""
    },
    {
      icone: "🏦",
      nome:  "Banco Cacimba",
      desc:  "Serviços e informações",
      url:   ""
    },
    {
      icone: "📻",
      nome:  "Rádio",
      desc:  "Ouça nossa programação",
      url:   ""
    },
    {
      icone: "🌿",
      nome:  "Instituto Nua",
      desc:  "Projetos e iniciativas",
      url:   ""
    },
    {
      icone: "🎓",
      nome:  "Unidiversidade da Quebrada",
      desc:  "Educação e formação",
      url:   ""
    },
  ],

};

/* ================================================================
   ⚠️  NÃO EDITE ABAIXO
================================================================ */

// Tema
const html   = document.documentElement;
const themeBtn = document.getElementById("themeBtn");
const saved  = localStorage.getItem("nuar-theme") || "light";
html.setAttribute("data-theme", saved);
themeBtn.textContent = saved === "dark" ? "☀️" : "🌙";

themeBtn.addEventListener("click", () => {
  const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
  html.setAttribute("data-theme", next);
  themeBtn.textContent = next === "dark" ? "☀️" : "🌙";
  localStorage.setItem("nuar-theme", next);
});

// Identidade
document.getElementById("orgName").textContent = CONFIG.nome;
document.getElementById("orgBio").textContent  = CONFIG.bio;
document.title = CONFIG.nome;
document.getElementById("year").textContent = new Date().getFullYear();

// Blocos
const container = document.getElementById("blocksContainer");
CONFIG.blocos.filter(b => b.nome).forEach(b => {
  const el = b.url ? document.createElement("a") : document.createElement("div");
  if (b.url) { el.href = b.url; el.target = "_blank"; el.rel = "noopener noreferrer"; }
  el.className = "block";
  el.innerHTML = `
    <div class="block-icon">${b.icone}</div>
    <div class="block-info">
      <div class="block-name">${b.nome}</div>
      ${b.desc ? `<div class="block-desc">${b.desc}</div>` : ""}
    </div>
    <span class="block-arrow">›</span>
  `;
  container.appendChild(el);
});

// Share toggle
const shareToggle = document.getElementById("shareToggle");
const shareBody   = document.getElementById("shareBody");
const chevron     = document.getElementById("shareChevron");
shareToggle.addEventListener("click", () => {
  const isOpen = shareBody.classList.toggle("open");
  chevron.style.transform = isOpen ? "rotate(180deg)" : "";
});

// QR Code
const url = CONFIG.paginaURL || window.location.href;
document.getElementById("urlText").textContent = url;
new QRCode(document.getElementById("qrcode"), {
  text: url, width: 140, height: 140,
  colorDark: "#111", colorLight: "#fff",
  correctLevel: QRCode.CorrectLevel.H
});

// Copiar link
const copyBtn = document.getElementById("copyBtn");
copyBtn.addEventListener("click", () => {
  navigator.clipboard.writeText(url).then(() => {
    copyBtn.textContent = "Copiado!";
    copyBtn.classList.add("copied");
    setTimeout(() => {
      copyBtn.textContent = "Copiar";
      copyBtn.classList.remove("copied");
    }, 2000);
  });
});

</script>
</body>
</html>
