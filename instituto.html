<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instituto NUA</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    :root {
      --cor: #ff004f;
      --cor-light: rgba(255,0,79,0.08);
      --cor-mid: rgba(255,0,79,0.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f9f8f6;
      color: #111;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 60px;
    }

    .page { width: 100%; max-width: 440px; display: flex; flex-direction: column; align-items: center; gap: 20px; }

    /* Voltar */
    .back-btn {
      align-self: flex-start;
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600;
      color: var(--cor);
      text-decoration: none;
      padding: 6px 0;
      opacity: .8;
      transition: opacity .2s;
    }
    .back-btn:hover { opacity: 1; }

    /* Header */
    .header {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 28px 20px;
      background: #fff;
      border-radius: 20px;
      border: 1.5px solid var(--cor-mid);
      box-shadow: 0 4px 20px var(--cor-light);
    }

    .logo-box {
      width: 90px; height: 90px;
      border-radius: 22px;
      background: var(--cor);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(255,0,79,.3);
    }
    .logo-box img { width: 70px; height: 70px; object-fit: contain; }

    .inst-name {
      font-size: 22px; font-weight: 900;
      letter-spacing: -.5px;
      color: #111;
      text-align: center;
    }
    .inst-desc {
      font-size: 13px; color: #777;
      text-align: center; line-height: 1.5;
    }

    /* Cards */
    .card {
      width: 100%;
      background: #fff;
      border-radius: 16px;
      border: 1px solid rgba(0,0,0,.07);
      box-shadow: 0 2px 12px rgba(0,0,0,.05);
      overflow: hidden;
    }

    .card-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: #aaa;
      padding: 14px 18px 8px;
    }

    /* Contato */
    .contact-item {
      display: flex; align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-top: 1px solid rgba(0,0,0,.05);
      text-decoration: none;
      color: #111;
      transition: background .15s;
    }
    .contact-item:hover { background: #f9f8f6; }
    .contact-item:first-of-type { border-top: none; }

    .contact-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--cor-light);
      border: 1.5px solid var(--cor-mid);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .contact-info { flex: 1; }
    .contact-name { font-size: 14px; font-weight: 700; }
    .contact-phone { font-size: 12px; color: #888; margin-top: 2px; }
    .contact-action {
      font-size: 12px; font-weight: 700;
      color: #25D366;
      background: rgba(37,211,102,.1);
      border-radius: 8px;
      padding: 5px 10px;
    }

    /* Links sociais — placeholder */
    .link-item {
      display: flex; align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-top: 1px solid rgba(0,0,0,.05);
      text-decoration: none;
      color: #111;
      transition: background .15s;
    }
    .link-item:hover { background: #f9f8f6; }
    .link-item:first-of-type { border-top: none; }

    .link-icon {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: var(--cor-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .link-info { flex: 1; }
    .link-name { font-size: 14px; font-weight: 700; }
    .link-sub { font-size: 12px; color: #aaa; margin-top: 2px; }
    .link-arrow { color: #ccc; font-size: 18px; }

    .em-breve {
      font-size: 10px; font-weight: 700;
      color: #bbb; letter-spacing: 1px;
      background: #f3f3f3;
      border-radius: 6px;
      padding: 3px 8px;
    }

    .footer { font-size: 11px; color: #bbb; }
  </style>
  <link rel="stylesheet" href="tema.css">
</head>
<body>
<button class="theme-btn" id="themeBtn" aria-label="Tema">🌙</button>
<div class="page">

  <a class="back-btn" href="index.html">‹ Voltar</a>

  <div class="header">
    <div class="logo-box">
      <img src="logos/4.svg" alt="Instituto NUA">
    </div>
    <div class="inst-name">Instituto NUA</div>
    <div class="inst-desc">Projetos e iniciativas</div>
  </div>

  <!-- Contato -->
  <div class="card">
    <div class="card-label">Contato</div>
    <a class="contact-item" href="https://wa.me/5511965292657" target="_blank" rel="noopener">
      <div class="contact-avatar">👩</div>
      <div class="contact-info">
        <div class="contact-name">Mazé</div>
        <div class="contact-phone">+55 11 96529-2657</div>
      </div>
      <span class="contact-action">WhatsApp</span>
    </a>
  </div>

  <!-- Links — adicione aqui -->
  <div class="card">
    <div class="card-label">Redes e Links</div>
    <a class="link-item" href="#" target="_blank" rel="noopener">
      <div class="link-icon">📸</div>
      <div class="link-info">
        <div class="link-name">Instagram</div>
        <div class="link-sub">Em breve</div>
      </div>
      <span class="em-breve">Em breve</span>
    </a>
    <a class="link-item" href="#" target="_blank" rel="noopener">
      <div class="link-icon">🌐</div>
      <div class="link-info">
        <div class="link-name">Site oficial</div>
        <div class="link-sub">Em breve</div>
      </div>
      <span class="em-breve">Em breve</span>
    </a>
  </div>

  <div class="footer">© 2025 Instituto NUA</div>
</div>
<script src="tema.js"></script>
</body>
</html>
