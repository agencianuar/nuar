<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unidiversidade da Quebrada</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    :root {
      --cor: #ff7300;
      --cor-rgb: 255,115,0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg, #f5f4f0);
      color: var(--text, #111);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 60px;
      transition: background .3s, color .3s;
    }

    .page { width: 100%; max-width: 440px; display: flex; flex-direction: column; align-items: center; gap: 16px; }

    .back-btn {
      align-self: flex-start;
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600;
      color: var(--cor);
      text-decoration: none;
      padding: 6px 0;
      opacity: .8;
      transition: opacity .2s;
    }
    .back-btn:hover { opacity: 1; }

    .header {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 28px 20px 24px;
      background: var(--surface, #fff);
      border-radius: 20px;
      border: 1.5px solid var(--cor);
      box-shadow: 0 4px 20px rgba(var(--cor-rgb), .08);
    }

    .logo-box {
      width: 86px; height: 86px;
      border-radius: 22px;
      background: var(--cor);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(var(--cor-rgb), .35);
    }
    .logo-box img { width: 66px; height: 66px; object-fit: contain; }

    .inst-name { font-size: 21px; font-weight: 900; letter-spacing: -.4px; color: var(--text, #111); text-align: center; }
    .inst-desc { font-size: 13px; color: var(--text2, #777); text-align: center; line-height: 1.5; }

    .card {
      width: 100%;
      background: var(--surface, #fff);
      border-radius: 18px;
      border: 1px solid var(--border, rgba(0,0,0,.07));
      box-shadow: 0 2px 12px rgba(0,0,0,.05);
      overflow: hidden;
    }

    .card-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted, #aaa);
      padding: 14px 18px 8px;
    }

    .contact-item {
      display: flex; align-items: center;
      gap: 14px;
      padding: 14px 18px;
      text-decoration: none;
    }

    .contact-avatar {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: rgba(var(--cor-rgb), .12);
      border: 1.5px solid var(--cor);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .contact-info { flex: 1; }
    .contact-name { font-size: 14px; font-weight: 700; color: var(--text, #111); }
    .contact-phone { font-size: 12px; color: var(--text2, #888); margin-top: 2px; }
    .contact-action {
      font-size: 12px; font-weight: 700;
      color: #25D366;
      background: rgba(37,211,102,.12);
      border-radius: 8px;
      padding: 5px 11px;
      flex-shrink: 0;
    }

    .link-item {
      display: flex; align-items: center;
      gap: 14px;
      padding: 14px 18px;
      text-decoration: none;
    }

    .link-icon {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: rgba(var(--cor-rgb), .12);
      border: 1.5px solid var(--cor);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .link-info { flex: 1; }
    .link-name { font-size: 14px; font-weight: 700; color: var(--text, #111); }
    .link-sub { font-size: 12px; color: var(--muted, #aaa); margin-top: 2px; }

    .em-breve {
      font-size: 10px; font-weight: 700;
      color: var(--muted, #bbb); letter-spacing: 1px;
      background: var(--surface2, #f3f2f0);
      border-radius: 6px;
      padding: 3px 8px;
      flex-shrink: 0;
    }

    .footer { font-size: 11px; color: var(--muted, #bbb); opacity: .6; }
  </style>
  <link rel="stylesheet" href="tema.css">
</head>
<body>
<button class="theme-btn" id="themeBtn" aria-label="Tema">🌙</button>
<div class="page">

  <a class="back-btn" href="index.html">‹ Voltar</a>

  <div class="header">
    <div class="logo-box">
      <img src="logos/5.svg" alt="Unidiversidade da Quebrada">
    </div>
    <div class="inst-name">Unidiversidade da Quebrada</div>
    <div class="inst-desc">Educação e formação</div>
  </div>

  <div class="card">
    <div class="card-label">Contato</div>
    <a class="contact-item" href="https://wa.me/5511934839811" target="_blank" rel="noopener">
      <div class="contact-avatar">👨</div>
      <div class="contact-info">
        <div class="contact-name">Willians</div>
        <div class="contact-phone">+55 11 93483-9811</div>
      </div>
      <span class="contact-action">WhatsApp</span>
    </a>
  </div>

  <div class="card">
    <div class="card-label">Redes e Links</div>
    <a class="link-item" href="#" target="_blank" rel="noopener">
      <div class="link-icon">📸</div>
      <div class="link-info">
        <div class="link-name">Instagram</div>
        <div class="link-sub">Em breve</div>
      </div>
      <span class="em-breve">Em breve</span>
    </a>
    <a class="link-item" href="#" target="_blank" rel="noopener">
      <div class="link-icon">🌐</div>
      <div class="link-info">
        <div class="link-name">Site oficial</div>
        <div class="link-sub">Em breve</div>
      </div>
      <span class="em-breve">Em breve</span>
    </a>
  </div>

  <div class="footer">© 2025 Unidiversidade da Quebrada</div>
</div>
<script src="tema.js"></script>
</body>
</html>
