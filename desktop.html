<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agência Nuar</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    [data-theme="light"] {
      --bg:       #f5f4f0;
      --surface:  #ffffff;
      --surface2: #eeece8;
      --border:   rgba(0,0,0,0.08);
      --text:     #111;
      --text2:    #555;
      --muted:    #aaa;
      --shadow:   0 1px 3px rgba(0,0,0,.05), 0 4px 14px rgba(0,0,0,.06);
      --shadow-h: 0 6px 24px rgba(0,0,0,.12);
    }
    [data-theme="dark"] {
      --bg:       #111111;
      --surface:  #1e1e1e;
      --surface2: #2a2a2a;
      --border:   rgba(255,255,255,0.10);
      --text:     #ffffff;
      --text2:    #bbbbbb;
      --muted:    #777777;
      --shadow:   0 1px 3px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.25);
      --shadow-h: 0 6px 28px rgba(0,0,0,.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 28px;
      transition: background .3s, color .3s;
    }

    .page {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .theme-btn {
      position: fixed;
      top: 16px; right: 16px;
      z-index: 999;
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
      will-change: transform;
      width: 42px; height: 42px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: var(--shadow);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      transition: all .2s;
    }
    .theme-btn:hover { box-shadow: var(--shadow-h); transform: scale(1.07); }

    .header {
      width: 100%;
      text-align: center;
      margin-bottom: 18px;
      animation: up .4s ease both;
    }
    .org-bio {
      font-size: 17px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.4px;
    }

    .section-label {
      width: 100%;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
      text-align: center;
    }

    .blocks {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-bottom: 24px;
      animation: up .4s .07s ease both;
    }

    .block {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 20px 22px;
      border-radius: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: var(--text);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transform: scale(1.0);
      transition: border-color .3s, box-shadow .3s, transform .35s cubic-bezier(.34,1.56,.64,1);
      will-change: transform;
    }
    .block::before { display: none; }
    .block:hover {
      transform: scale(1.1);
      border-color: var(--inst-color, var(--border));
      box-shadow: var(--shadow-h),
                  0 0 0 1px var(--inst-color, transparent),
                  0 0 24px 4px color-mix(in srgb, var(--inst-color, transparent) 35%, transparent);
    }
    .block:active { transform: scale(0.97); }

    .block-icon {
      width: 70px; height: 70px;
      border-radius: 17px;
      background: var(--inst-color, var(--surface));
      border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      position: relative; z-index: 1;
      transition: background .3s, border-color .3s, box-shadow .3s;
      overflow: hidden;
      box-shadow: 0 4px 12px color-mix(in srgb, var(--inst-color, transparent) 35%, transparent);
    }
    .block-logo {
      width: 54px; height: 54px;
      object-fit: contain;
      transform: scale(0.8);
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
      border-radius: 10px;
    }
    .block-logo.logo-bg-fix { background: #fff; border-radius: 10px; }
    .block-logo.logo-grande { transform: scale(1.0); }
    .block:hover .block-logo { transform: scale(1.15); }
    .block:hover .block-logo.logo-grande { transform: scale(1.2); }
    .block:hover .block-icon {
      box-shadow: 0 6px 18px color-mix(in srgb, var(--inst-color, transparent) 50%, transparent);
    }

    .block-info { flex: 1; position: relative; z-index: 1; }
    .block-name { font-size: 15px; font-weight: 700; letter-spacing: -.2px; }
    .block-desc { font-size: 13px; color: var(--text2); margin-top: 3px; }

    .block-arrow {
      color: var(--muted);
      font-size: 20px;
      flex-shrink: 0;
      position: relative; z-index: 1;
      transition: transform .2s, color .2s;
    }
    .block:hover .block-arrow { transform: translateX(3px); color: var(--inst-color, var(--text)); }

    /* QR colapsável */
    .qr-card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
      animation: up .4s .14s ease both;
      overflow: hidden;
    }
    .qr-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      cursor: pointer;
      background: none;
      border: none;
      color: var(--text);
      position: relative;
    }
    .qr-toggle-label { font-size: 12px; font-weight: 700; text-align: center; }
    .qr-toggle-sub { font-size: 10px; color: var(--muted); margin-top: 1px; text-align: center; }
    .qr-arrow {
      position: absolute; right: 16px;
      font-size: 18px; color: var(--muted);
      transition: transform .3s ease, color .2s;
      width: 24px; text-align: center;
    }
    .qr-card.open .qr-arrow { transform: rotate(90deg); }
    .qr-toggle:hover { background: var(--surface2); }
    .qr-toggle:hover .qr-arrow { color: var(--text); }

    .qr-body { max-height: 0; overflow: hidden; transition: max-height .35s ease; }
    .qr-card.open .qr-body { max-height: 400px; }
    .qr-body-inner {
      padding: 0 18px 18px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }

    #qrcode { padding: 10px; background: #fff; border-radius: 10px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
    #qrcode img, #qrcode canvas { display: block; border-radius: 4px; }

    .qr-share-btn {
      width: 100%; padding: 12px; border-radius: 12px;
      background: var(--surface2); border: 1px solid var(--border);
      font-size: 13px; font-weight: 700; color: var(--text);
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .qr-share-btn:hover { border-color: var(--text); box-shadow: var(--shadow-h); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .25s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      width: 100%; max-width: 460px;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 48px;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      transform: translateY(100%); transition: transform .3s ease;
      box-shadow: 0 -4px 40px rgba(0,0,0,.2);
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-handle { width: 40px; height: 4px; border-radius: 999px; background: var(--border); margin-bottom: 4px; }
    .modal-title { font-size: 15px; font-weight: 800; align-self: flex-start; }
    .modal-qr { padding: 10px; background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,.1); }
    .modal-qr img, .modal-qr canvas { display: block; border-radius: 4px; }

    .url-row {
      display: flex; align-items: center; gap: 8px; width: 100%;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
    }
    .url-text { flex: 1; font-size: 12px; color: var(--muted); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .copy-btn {
      flex-shrink: 0; font-size: 11px; font-weight: 700; color: var(--text);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 7px; padding: 6px 14px; cursor: pointer; transition: all .15s; min-height: 34px;
    }
    .copy-btn:hover { border-color: var(--text); }
    .copy-btn.copiado { color: #22c55e; border-color: #22c55e; }

    .share-options { display: flex; gap: 12px; width: 100%; justify-content: center; }
    .share-opt {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer; flex: 1; max-width: 72px;
    }
    .share-opt-icon {
      width: 52px; height: 52px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; background: var(--surface2);
      position: relative; overflow: hidden;
      transition: transform .2s, box-shadow .2s;
    }
    .share-opt-icon::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, var(--opt-color) 0%, transparent 80%);
      opacity: 0; transition: opacity .25s ease;
    }
    .share-opt:hover .share-opt-icon::before { opacity: 1; }
    .share-opt:hover .share-opt-icon {
      transform: scale(1.08);
      box-shadow: 0 4px 16px color-mix(in srgb, var(--opt-color) 40%, transparent);
    }
    .share-opt-emoji { position: relative; z-index: 1; }
    .share-opt-label { font-size: 10px; font-weight: 600; color: var(--muted); text-align: center; }

    .download-btn {
      width: 100%; padding: 13px; border-radius: 12px;
      background: var(--surface2); border: 1px solid var(--border);
      font-size: 13px; font-weight: 700; color: var(--text);
      cursor: pointer; transition: all .2s; min-height: 48px;
    }
    .download-btn:hover { border-color: var(--text); box-shadow: var(--shadow-h); }

    .footer { font-size: 11px; color: var(--muted); opacity: .5; }

    @keyframes up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<button class="theme-btn" id="themeBtn" aria-label="Tema">🌙</button>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Compartilhar</div>
    <div class="modal-qr" id="qrcodeModal"></div>
    <div class="url-row">
      <span class="url-text" id="urlText"></span>
      <button class="copy-btn" id="copyBtn">Copiar</button>
    </div>
    <div class="share-options" id="shareOptions"></div>
    <button class="download-btn" id="downloadBtn">⬇️ Baixar QR Code</button>
  </div>
</div>

<div class="page">
  <div class="header">
    <p class="org-bio" id="orgBio"></p>
  </div>
  <div class="section-label">Acesse</div>
  <div class="blocks" id="blocksContainer"></div>
  <div class="qr-card" id="qrCard">
    <button class="qr-toggle" id="qrToggle">
      <div>
        <div class="qr-toggle-label">Código QR</div>
        <div class="qr-toggle-sub">Toque para ver e compartilhar</div>
      </div>
      <span class="qr-arrow">›</span>
    </button>
    <div class="qr-body">
      <div class="qr-body-inner">
        <div id="qrcode"></div>
        <button class="qr-share-btn" id="shareFab">📤 Compartilhar</button>
      </div>
    </div>
  </div>
  <div class="footer">© <span id="year"></span> Agência Nuar</div>
</div>

<script>
const CONFIG = {
  nome: "Agência Nuar",
  bio:  "Nossas iniciativas em um só lugar.",
  paginaURL: "https://agencianuar.github.io/nuar",
  blocos: [
    { logo: "logos/4.svg", nome: "Instituto NUA",             desc: "Projetos e iniciativas",          cor: "#ff004f", url: "instituto.html" },
    { logo: "logos/1.svg", nome: "Agência Nuar",              desc: "Nossa agência principal",          cor: "#8c00f0", url: "agencia.html" },
    { logo: "logos/3.svg", nome: "Rádio TV Nuar",             desc: "Ouça e assista nossa programação", cor: "#00a900", url: "radio.html" },
    { logo: "logos/2.svg", bgFix: true, logoGrande: true,
                           nome: "Banco Cacimba",             desc: "Serviços e informações",           cor: "#c9a074", url: "cacimba.html" },
    { logo: "logos/5.svg", logoGrande: true,
                           nome: "Unidiversidade da Quebrada",desc: "Educação e formação",              cor: "#ff7300", url: "unidiversidade.html" },
  ],
  compartilhar: [
    { icone: "💬", label: "WhatsApp",  cor: "#8c00f0", acao: "whatsapp" },
    { icone: "✈️",  label: "Telegram",  cor: "#c9a074", acao: "telegram" },
    { icone: "📸", label: "Instagram", cor: "#00a900", acao: "instagram" },
    { icone: "🔗", label: "Copiar",    cor: "#ff004f", acao: "copiar"   },
    { icone: "📱", label: "Mais",      cor: "#ff7300", acao: "nativo"   },
  ],
};

// Tema
const html = document.documentElement;
const themeBtn = document.getElementById("themeBtn");
const tSaved = localStorage.getItem("nuar-theme") || "light";
html.setAttribute("data-theme", tSaved);
themeBtn.textContent = tSaved === "dark" ? "☀️" : "🌙";
themeBtn.addEventListener("click", () => {
  const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
  html.setAttribute("data-theme", next);
  themeBtn.textContent = next === "dark" ? "☀️" : "🌙";
  localStorage.setItem("nuar-theme", next);
});

document.getElementById("orgBio").textContent = CONFIG.bio;
document.title = CONFIG.nome;
document.getElementById("year").textContent = new Date().getFullYear();

// Blocos
const container = document.getElementById("blocksContainer");
CONFIG.blocos.forEach(b => {
  const el = b.url ? document.createElement("a") : document.createElement("div");
  if (b.url) { el.href = b.url; }
  el.className = "block";
  el.style.setProperty("--inst-color", b.cor);
  el.innerHTML = `
    <div class="block-icon">
      ${b.logo ? `<img src="${b.logo}" alt="${b.nome}" class="block-logo${b.bgFix ? ' logo-bg-fix' : ''}${b.logoGrande ? ' logo-grande' : ''}">` : b.icone}
    </div>
    <div class="block-info">
      <div class="block-name">${b.nome}</div>
      ${b.desc ? `<div class="block-desc">${b.desc}</div>` : ""}
    </div>
    <span class="block-arrow">›</span>
  `;
  container.appendChild(el);
});

const url = CONFIG.paginaURL;
new QRCode(document.getElementById("qrcode"), { text: url, width: 110, height: 110, colorDark: "#111", colorLight: "#fff", correctLevel: QRCode.CorrectLevel.H });
new QRCode(document.getElementById("qrcodeModal"), { text: url, width: 160, height: 160, colorDark: "#111", colorLight: "#fff", correctLevel: QRCode.CorrectLevel.H });
document.getElementById("urlText").textContent = url;

document.getElementById("qrToggle").addEventListener("click", () => document.getElementById("qrCard").classList.toggle("open"));

const overlay = document.getElementById("modalOverlay");
document.getElementById("shareFab").addEventListener("click", () => overlay.classList.add("open"));
overlay.addEventListener("click", e => { if (e.target === overlay) overlay.classList.remove("open"); });

const optsEl = document.getElementById("shareOptions");
CONFIG.compartilhar.forEach(o => {
  const div = document.createElement("div");
  div.className = "share-opt";
  div.innerHTML = `<div class="share-opt-icon" style="--opt-color:${o.cor}"><span class="share-opt-emoji">${o.icone}</span></div><span class="share-opt-label">${o.label}</span>`;
  div.addEventListener("click", () => {
    const enc = encodeURIComponent(url);
    const msg = encodeURIComponent("Acesse: " + url);
    if      (o.acao === "whatsapp")  window.open("https://wa.me/?text=" + msg, "_blank");
    else if (o.acao === "telegram")  window.open("https://t.me/share/url?url=" + enc, "_blank");
    else if (o.acao === "instagram") navigator.clipboard.writeText(url).then(() => alert("Link copiado! Cole nos seus stories."));
    else if (o.acao === "copiar")    { navigator.clipboard.writeText(url); div.querySelector(".share-opt-label").textContent = "Copiado!"; setTimeout(() => div.querySelector(".share-opt-label").textContent = "Copiar", 2000); }
    else if (o.acao === "nativo")    navigator.share ? navigator.share({ title: CONFIG.nome, url }) : navigator.clipboard.writeText(url);
  });
  optsEl.appendChild(div);
});

document.getElementById("copyBtn").addEventListener("click", function() {
  navigator.clipboard.writeText(url).then(() => {
    this.textContent = "Copiado!"; this.classList.add("copiado");
    setTimeout(() => { this.textContent = "Copiar"; this.classList.remove("copiado"); }, 2000);
  });
});

document.getElementById("downloadBtn").addEventListener("click", () => {
  const canvas = document.querySelector("#qrcodeModal canvas");
  if (!canvas) return;
  const link = document.createElement("a");
  link.download = "qrcode-agencianuar.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
});
</script>
</body>
</html>
